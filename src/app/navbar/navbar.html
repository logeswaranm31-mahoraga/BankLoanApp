<nav class="navbar navbar-expand-lg navbar-light navbar-custom">
  <div class="container-fluid px-4">
    <!-- Brand -->
    <a class="navbar-brand fw-bold" routerLink="/">
      <svg
        class="brand-icon"
        xmlns="http://www.w3.org/2000/svg"
        width="24"
        height="24"
        fill="currentColor"
        viewBox="0 0 16 16">
        <path
          d="M0 4a2 2 0 0 1 2-2h12a2 2 0 0 1 2 2v8a2 2 0 0 1-2 2H2a2 2 0 0 1-2-2V4zm2-1a1 1 0 0 0-1 1v1h14V4a1 1 0 0 0-1-1H2zm13 4H1v5a1 1 0 0 0 1 1h12a1 1 0 0 0 1-1V7z" />
      </svg>
      <span class="ms-2">BankApp</span>
    </a>

    <!-- Toggle button for mobile -->
    <button
      class="navbar-toggler border-0"
      type="button"
      (click)="toggleNavbar()"
      [attr.aria-expanded]="isNavbarOpen()">
      <span class="navbar-toggler-icon"></span>
    </button>

    <!-- Navigation items -->
    <div class="collapse navbar-collapse" [class.show]="isNavbarOpen()">
      <!-- Center Navigation Menu -->
      <ul class="navbar-nav mx-auto mb-2 mb-lg-0">
        <li class="nav-item">
          <a
            class="nav-link nav-link-custom"
            routerLink="/home"
            routerLinkActive="active"
            (click)="closeNavbar()">
            <i class="bi bi-house-door me-2"></i>Home
          </a>
        </li>
        @if(userDetails && userDetails?.userName){

          <li class="nav-item">
            <a
              class="nav-link nav-link-custom"
              routerLink="/new-form"
              routerLinkActive="active"
              (click)="closeNavbar()">
              <i class="bi bi-file-earmark-plus me-2"></i>Apply for Loan
            </a>
          </li>
          <li class="nav-item">
            <a
              class="nav-link nav-link-custom"
              routerLink="/application-list"
              routerLinkActive="active"
              (click)="closeNavbar()">
              <i class="bi bi-list-check me-2"></i>My Applications
            </a>
          </li>
        }
        @if(!userDetails){
          <li class="nav-item">
            <a
              class="nav-link nav-link-custom"
              routerLink="/register"
              routerLinkActive="active"
              [queryParams]="{isLogin:false}"
              (click)="closeNavbar()">
              <i class="bi bi-person-plus me-2"></i>Register
            </a>
          </li>
          <li class="nav-item">
            <a
              class="nav-link nav-link-custom"
              routerLink="/register"
              routerLinkActive="active"
              [queryParams]="{isLogin:true}"
              (click)="closeNavbar()">
              <i class="bi bi-person-plus me-2"></i>Login
            </a>
          </li>
        }
      </ul>

      <!-- User Section (Right side) -->
       @if(userDetails&& userDetails?.userName){
         <div class="navbar-user-section d-flex align-items-center">
           <!-- User Details Dropdown -->
           <div class="dropdown me-3">
             <button
               class="btn btn-link dropdown-toggle user-dropdown-btn d-flex align-items-center text-decoration-none"
               type="button"
               id="userDropdown"
               data-bs-toggle="dropdown"
               aria-expanded="false">
               <div class="user-avatar">{{ user().avatar }}</div>
               <div class="user-info d-none d-md-block ms-2">
                 <div class="user-name">{{ user().name }}</div>
                 <div class="user-email">{{ user().email }}</div>
               </div>
             </button>
             <ul class="dropdown-menu dropdown-menu-end" aria-labelledby="userDropdown">
               <li>
                 <h6 class="dropdown-header">{{ user().name }}</h6>
               </li>
               <li>
                 <small class="dropdown-header text-muted">{{ user().email }}</small>
               </li>
               <li><hr class="dropdown-divider" /></li>
               <li>
                 <a class="dropdown-item" href="#"
                   ><i class="bi bi-person me-2"></i>Profile</a
                 >
               </li>
               <li>
                 <a class="dropdown-item" href="#"
                   ><i class="bi bi-gear me-2"></i>Settings</a
                 >
               </li>
               <li><hr class="dropdown-divider" /></li>
               <li>
                 <button
                   class="dropdown-item text-danger"
                   (click)="logout()"
                   type="button">
                   <i class="bi bi-box-arrow-right me-2"></i>Logout
                 </button>
               </li>
             </ul>
           </div>
   
           <!-- Logout Button (visible on small screens) -->
           <button
             class="btn btn-outline-danger btn-sm d-md-none logout-btn"
             (click)="logout()">
             <i class="bi bi-box-arrow-right me-1"></i>Logout
           </button>
         </div>
       }
    </div>
  </div>
</nav>
